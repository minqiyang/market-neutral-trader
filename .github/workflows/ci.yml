name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Run lint
        run: ruff check .

      - name: Replay orderbook fixture
        run: python scripts/01_replay_orderbook_fixture.py

      - name: Record fixture snapshots
        run: python scripts/02_record_fixture_snapshots.py --output /tmp/edmn_ci_snapshots.jsonl

      - name: Replay snapshots
        run: python scripts/03_replay_snapshots.py --input /tmp/edmn_ci_snapshots.jsonl

      - name: Run quote replay dry run
        run: python scripts/04_quote_replay_dry_run.py --input /tmp/edmn_ci_snapshots.jsonl

      - name: Run demo execution smoke check
        run: python scripts/05_demo_execution_smoke.py --log-output /tmp/edmn_ci_execution_smoke.jsonl

      - name: Run market maker replay dry run
        run: python scripts/06_market_maker_replay.py --input /tmp/edmn_ci_snapshots.jsonl --log-output /tmp/edmn_ci_market_maker.jsonl

      - name: Run market maker replay demo opt-in
        run: python scripts/06_market_maker_replay.py --input /tmp/edmn_ci_snapshots.jsonl --demo-opt-in --log-output /tmp/edmn_ci_market_maker_demo.jsonl

      - name: Run research report
        run: python scripts/07_research_report.py --market-maker-log /tmp/edmn_ci_market_maker.jsonl --output /tmp/edmn_ci_research_report.md

      - name: Run paper report pack
        run: python scripts/10_paper_report_pack.py --market-maker-log /tmp/edmn_ci_market_maker.jsonl --sec-companyfacts tests/fixtures/sec_companyfacts_aapl.json --output-dir /tmp/edmn_ci_report_pack
