      - name: Scan pull-request changes
        if: github.event_name == 'pull_request'
        run: >-
          python scripts/check_forward_only_data_boundary.py
          --repo .
          --policy .github/forward_only_data_boundary.json
          --expected-profile public
          --mode pr-diff
          --base "${{ github.event.pull_request.base.sha }}"
          --head HEAD
          --ruleset secrets
          --github-event "$GITHUB_EVENT_PATH"
      - name: Scan pushed changes
        if: github.event_name == 'push'
        run: >-
          python scripts/check_forward_only_data_boundary.py
          --repo .
          --policy .github/forward_only_data_boundary.json
          --expected-profile public
          --mode commit-range
          --base "${{ github.event.before != '0000000000000000000000000000000000000000' && github.event.before || '3de723578c0b44d742887305b1cbe82efd751f2b' }}"
          --head HEAD
          --ruleset secrets
          --github-event "$GITHUB_EVENT_PATH"

  synthetic-fixture-provenance:
    name: Synthetic Fixture Provenance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Scan pull-request changes
        if: github.event_name == 'pull_request'
        run: >-
          python scripts/check_forward_only_data_boundary.py
          --repo .
          --policy .github/forward_only_data_boundary.json
          --expected-profile public
          --mode pr-diff
          --base "${{ github.event.pull_request.base.sha }}"
          --head HEAD
          --ruleset synthetic
          --github-event "$GITHUB_EVENT_PATH"
      - name: Scan pushed changes
        if: github.event_name == 'push'
        run: >-
          python scripts/check_forward_only_data_boundary.py
          --repo .
          --policy .github/forward_only_data_boundary.json
          --expected-profile public
          --mode commit-range
          --base "${{ github.event.before != '0000000000000000000000000000000000000000' && github.event.before || '3de723578c0b44d742887305b1cbe82efd751f2b' }}"
          --head HEAD
          --ruleset synthetic
