name: CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        shell: bash
        run: |
          if python -m pip install -e ".[dev]" >/tmp/edmn_install.log 2>&1; then
            echo "DEPENDENCY_INSTALL_PASS"
          else
            echo "DEPENDENCY_INSTALL_FAILED"
            exit 1
          fi

      - name: Run tests
        shell: bash
        run: |
          if pytest >/tmp/edmn_pytest.log 2>&1; then
            echo "PUBLIC_TESTS_PASS"
          else
            echo "PUBLIC_TESTS_FAILED"
            exit 1
          fi

      - name: Run lint
        shell: bash
        run: |
          if ruff check . >/tmp/edmn_ruff.log 2>&1; then
            echo "PUBLIC_LINT_PASS"
          else
            echo "PUBLIC_LINT_FAILED"
            exit 1
          fi

  forward-only-data-boundary:
    name: Forward-Only Data Boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Scan pull-request changes
        if: github.event_name == 'pull_request'
        run: >-
          python scripts/check_forward_only_data_boundary.py
          --repo .
          --policy .github/forward_only_data_boundary.json
          --expected-profile public
          --mode pr-diff
          --base "${{ github.event.pull_request.base.sha }}"
          --head HEAD
          --ruleset boundary
          --github-event "$GITHUB_EVENT_PATH"
      - name: Scan pushed changes
        if: github.event_name == 'push'
        run: >-
          python scripts/check_forward_only_data_boundary.py
          --repo .
          --policy .github/forward_only_data_boundary.json
          --expected-profile public
          --mode commit-range
          --base "${{ github.event.before != '0000000000000000000000000000000000000000' && github.event.before || '3de723578c0b44d742887305b1cbe82efd751f2b' }}"
          --head HEAD
          --ruleset boundary
          --github-event "$GITHUB_EVENT_PATH"

  no-secrets:
    name: No Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
