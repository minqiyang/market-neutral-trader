<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-labelledby="title desc">
  <title id="title">EDMN Trader evidence-gated workflow</title>
  <desc id="desc">Read-only inputs become normalized books, complement candidates, stressed simulations, controlled paper records, and reconciled Demo evidence.</desc>

  <rect width="1280" height="560" rx="28" fill="#141414"/>

  <g font-family="Inter, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
    <text x="64" y="86" font-size="34" font-weight="600" letter-spacing="-1" fill="#f5f5f5">Evidence-gated workflow</text>
    <line x1="64" y1="118" x2="1216" y2="118" stroke="#303030"/>

    <g transform="translate(62 160)" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" font-weight="600" text-anchor="middle">
      <g>
        <rect width="174" height="126" fill="#1b1b1b" stroke="#343434"/>
        <text x="87" y="69" fill="#f5f5f5">READ</text>
      </g>
      <path d="M178 63h16m-6-6 6 6-6 6" fill="none" stroke="#59c98b" stroke-width="2"/>

      <g transform="translate(196)">
        <rect width="174" height="126" fill="#1b1b1b" stroke="#343434"/>
        <text x="87" y="69" fill="#f5f5f5">NORMALIZE</text>
      </g>
      <path d="M374 63h16m-6-6 6 6-6 6" fill="none" stroke="#59c98b" stroke-width="2"/>

      <g transform="translate(392)">
        <rect width="174" height="126" fill="#1b1b1b" stroke="#343434"/>
        <text x="87" y="69" fill="#f5f5f5">SCAN</text>
      </g>
      <path d="M570 63h16m-6-6 6 6-6 6" fill="none" stroke="#59c98b" stroke-width="2"/>

      <g transform="translate(588)">
        <rect width="174" height="126" fill="#1b1b1b" stroke="#343434"/>
        <text x="87" y="69" fill="#f5f5f5">SIMULATE</text>
      </g>
      <path d="M766 63h16m-6-6 6 6-6 6" fill="none" stroke="#59c98b" stroke-width="2"/>

      <g transform="translate(784)">
        <rect width="174" height="126" fill="#1b1b1b" stroke="#343434"/>
        <text x="87" y="69" fill="#f5f5f5">CONTROL</text>
      </g>
      <path d="M962 63h16m-6-6 6 6-6 6" fill="none" stroke="#59c98b" stroke-width="2"/>

