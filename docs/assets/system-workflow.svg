      <g transform="translate(78 79)" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13" text-anchor="middle">
        <g><rect width="190" height="42" fill="#181818" stroke="#383838"/><text x="95" y="26" fill="#bdbdbd">DECIMAL</text></g>
        <g transform="translate(202)"><rect width="190" height="42" fill="#181818" stroke="#383838"/><text x="95" y="26" fill="#bdbdbd">HASHES</text></g>
        <g transform="translate(404)"><rect width="190" height="42" fill="#181818" stroke="#383838"/><text x="95" y="26" fill="#bdbdbd">KILL SWITCH</text></g>
        <g transform="translate(606)"><rect width="190" height="42" fill="#181818" stroke="#383838"/><text x="95" y="26" fill="#bdbdbd">APPROVAL</text></g>
        <g transform="translate(808)"><rect width="190" height="42" fill="#181818" stroke="#383838"/><text x="95" y="26" fill="#bdbdbd">7 / 30 / 90D</text></g>
