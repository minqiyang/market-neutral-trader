<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">EDMN Trader</title>
  <desc id="desc">Evidence-gated prediction-market research from read-only order books through paper and Demo validation.</desc>

  <rect width="1280" height="640" rx="28" fill="#141414"/>

  <g font-family="Inter, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
    <text x="72" y="184" font-size="72" font-weight="600" letter-spacing="-3" fill="#f5f5f5">EDMN Trader</text>
    <text x="72" y="270" font-size="30" font-weight="500" letter-spacing="-.6" fill="#d4d4d4">Evidence before execution.</text>
    <text x="72" y="330" font-size="21" fill="#9e9e9e">Prediction-market research from order book</text>
    <text x="72" y="362" font-size="21" fill="#9e9e9e">to audited paper and Demo evidence.</text>
    <line x1="72" y1="424" x2="600" y2="424" stroke="#303030"/>

    <g transform="translate(690 110)">
      <rect width="516" height="420" rx="4" fill="#1b1b1b" stroke="#303030"/>
      <text x="34" y="62" font-size="28" font-weight="600" letter-spacing="-.6" fill="#f5f5f5">Canonical YES-side book</text>

      <g transform="translate(34 102)" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
        <line x1="0" y1="0" x2="448" y2="0" stroke="#2b2b2b"/>
        <text x="0" y="38" font-size="14" letter-spacing="1" fill="#a3a3a3">YES BID</text>
        <text x="448" y="40" text-anchor="end" font-size="25" fill="#f5f5f5">0.58</text>
        <rect y="58" width="448" height="12" fill="#242424"/>
        <rect y="58" width="260" height="12" fill="#59c98b"/>

        <text x="0" y="112" font-size="14" letter-spacing="1" fill="#a3a3a3">NO BID</text>
        <text x="448" y="114" text-anchor="end" font-size="25" fill="#f5f5f5">0.42</text>
        <rect y="132" width="448" height="12" fill="#242424"/>
        <rect y="132" width="188" height="12" fill="#ff9b61"/>

        <line x1="0" y1="174" x2="448" y2="174" stroke="#2b2b2b"/>
        <text x="0" y="210" font-size="14" letter-spacing="1" fill="#a3a3a3">COMPLEMENT</text>
        <text x="448" y="212" text-anchor="end" font-size="25" fill="#59c98b">1.00</text>
      </g>

      <g transform="translate(34 342)" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="12" text-anchor="middle">
        <g><rect width="88" height="48" fill="#181818" stroke="#3a3a3a"/><text x="44" y="30" fill="#f0f0f0">READ</text></g>
        <path d="M98 24h22m-6-6 6 6-6 6" fill="none" stroke="#777" stroke-width="1.5"/>
        <g transform="translate(132)"><rect width="88" height="48" fill="#181818" stroke="#3a3a3a"/><text x="44" y="30" fill="#f0f0f0">REPLAY</text></g>
        <path d="M230 24h22m-6-6 6 6-6 6" fill="none" stroke="#777" stroke-width="1.5"/>
        <g transform="translate(264)"><rect width="88" height="48" fill="#181818" stroke="#3a3a3a"/><text x="44" y="30" fill="#f0f0f0">PAPER</text></g>
        <path d="M362 24h22m-6-6 6 6-6 6" fill="none" stroke="#777" stroke-width="1.5"/>
        <g transform="translate(396)"><rect width="52" height="48" fill="#181818" stroke="#3a3a3a"/><text x="26" y="30" fill="#f0f0f0">DEMO</text></g>
      </g>

    </g>
  </g>
</svg>
