<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="480" viewBox="0 0 1280 480" role="img" aria-labelledby="title desc">
  <title id="title">EDMN Trader public and private safety boundary</title>
  <desc id="desc">The public repository contains research, paper, and Demo workflows. A separate evidence gate defines any future private live system.</desc>

  <rect width="1280" height="480" rx="28" fill="#141414"/>

  <g font-family="Inter, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
    <text x="64" y="86" font-size="34" font-weight="600" letter-spacing="-1" fill="#f5f5f5">Public by design. Private by evidence.</text>
    <line x1="64" y1="118" x2="1216" y2="118" stroke="#303030"/>

    <g transform="translate(64 152)">
      <rect width="340" height="286" fill="#1b1b1b" stroke="#343434"/>
      <rect width="4" height="286" fill="#59c98b"/>
      <text x="28" y="58" font-size="27" font-weight="600" fill="#f5f5f5">Public system</text>
      <g font-size="16" fill="#adadad">
        <circle cx="32" cy="108" r="4" fill="#59c98b"/><text x="48" y="114">Read-only data + replay</text>
        <circle cx="32" cy="151" r="4" fill="#59c98b"/><text x="48" y="157">Simulation + paper ledger</text>
        <circle cx="32" cy="194" r="4" fill="#59c98b"/><text x="48" y="200">Risk + manual approval</text>
        <circle cx="32" cy="237" r="4" fill="#59c98b"/><text x="48" y="243">Demo + reconciliation</text>
      </g>
    </g>

    <path d="M418 295h38m-7-7 7 7-7 7" fill="none" stroke="#777" stroke-width="2"/>

    <g transform="translate(470 152)">
      <rect width="340" height="286" fill="#1b1b1b" stroke="#343434"/>
      <rect width="4" height="286" fill="#f5f5f5"/>
      <text x="28" y="58" font-size="27" font-weight="600" fill="#f5f5f5">Evidence gate</text>
      <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14" fill="#adadad">
        <text x="28" y="108">30–90d read-only data</text>
        <text x="28" y="145">30+d paper history</text>
        <text x="28" y="182">validated fees + slippage</text>
        <text x="28" y="219">zero mismatches + risk drills</text>
        <text x="28" y="256">legal + platform review</text>
      </g>
    </g>

    <path d="M824 295h38m-7-7 7 7-7 7" fill="none" stroke="#777" stroke-width="2"/>

    <g transform="translate(876 152)">
      <rect width="340" height="286" fill="#1b1b1b" stroke="#343434"/>
      <rect width="4" height="286" fill="#ff9b61"/>
      <text x="28" y="58" font-size="27" font-weight="600" fill="#f5f5f5">Private live</text>
      <g font-size="16" fill="#adadad">
        <circle cx="32" cy="108" r="4" fill="#ff9b61"/><text x="48" y="114">Production credentials</text>
        <circle cx="32" cy="151" r="4" fill="#ff9b61"/><text x="48" y="157">Production endpoints</text>
        <circle cx="32" cy="194" r="4" fill="#ff9b61"/><text x="48" y="200">Broker / venue execution</text>
        <circle cx="32" cy="237" r="4" fill="#ff9b61"/><text x="48" y="243">Real-money operations</text>
      </g>
    </g>

  </g>
</svg>
